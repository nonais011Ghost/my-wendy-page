<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Gallery - Dream Flavours</title>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
   <link rel="stylesheet" href="style.css">
</head>
<body>
   <header class="text-center p-3 bg-dark text-white">
     <h1>Dream Flavours</h1>
     <div class="btn-group mt-2" role="group">
       <a href="index.html" class="btn btn-outline-light">Home</a>
       <a href="about.html" class="btn btn-outline-light">About</a>
       <a href="products.html" class="btn btn-outline-light">Products</a>
       <a href="gallery.html" class="btn btn-outline-light">Gallery</a>
       <a href="contact.html" class="btn btn-outline-light">Contact</a>
     </div>
   </header>

   <main class="container mt-4">
     <h2 class="text-center mb-4">Gallery</h2>
     <div class="row">
       <div class="col-md-4 mb-3">
         <img src="images/gallery2.jpg" class="img-fluid rounded shadow" alt="Yoghurt 1">
       </div>
       <div class="col-md-4 mb-3">
         <img src="images/gallery4.jpg" class="img-fluid rounded shadow" alt="Yoghurt 2">
       </div>
       <div class="col-md-4 mb-3">
         <img src="images/gallery3.jpeg" class="img-fluid rounded shadow" alt="Yoghurt 3">
       </div>
     </div>
   </main>

   <footer class="text-center mt-4 p-3 bg-dark text-white">
     <p>&copy; 2026 Dream Flavours</p>
   </footer>

   <script>
     const currentPage = window.location.pathname.split("/").pop();
     document.querySelectorAll("header a").forEach(link => {
       if(link.getAttribute("href") === currentPage){
         link.classList.remove("btn-outline-light");
         link.classList.add("btn-primary");
       }
     });
   </script>
</body>
</html>
